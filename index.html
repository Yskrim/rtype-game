<html>
  <head>
    <!-- p5.js library (v1.11.4 - compatible with p5play v3.33) -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/p5.js"></script>
        
    <!-- p5.dom and p5.sound -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/addons/p5.dom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/addons/p5.sound.min.js"></script>

    <!-- Planck.js (REQUIRED before p5play) -->
    <script src="libraries/planck.min.js"></script>

    <!-- p5play library (use local file instead of CDN) -->
    <script src="libraries/p5play.min.js"></script>

    <!-- CUSTOM FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>

    <!-- game elements -->
    <script src="game/layout.js"></script>
    <script src="game/Player.js"></script>
    <script src="game/Bullet.js"></script>
    <script src="game/Enemy.js"></script>
    <script src="game/Boss.js"></script>
    <script src="game/collisions.js"></script>
    <script src="game/explode.js"></script>
    <script src="game/utils.js"></script>
    <script src="game/Pause.js"></script>
    
    <!-- GUI elements -->
    <script src="screens/Main_menu.js"></script>
    <script src="screens/GameOver.js"></script>
    <script src="screens/Loading.js"></script>
    <script src="screens/Settings.js"></script>
    <script src="screens/Leaderboard.js"></script>
    <script src="screens/game.js"></script>
    
    
    <!-- Main file -->
    <script src="sketch.js"></script>


  </body>
</html>
